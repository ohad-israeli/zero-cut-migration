# FENCED state — identical to init, plus a `fence` on the route that rejects all
# client traffic with BROKER_NOT_AVAILABLE. kcp applies this for the brief window
# while it promotes the mirror topics at zero lag. Clients retry (they don't die),
# then sail through once the switchover CR lands. Path passed to:
#   kcp migration init --fenced-cr-yaml gateway_fenced.yaml
apiVersion: platform.confluent.io/v1beta1
kind: Gateway
metadata:
  labels:
    app.kubernetes.io/name: confluent-for-kubernetes
    app.kubernetes.io/managed-by: kustomize
  name: migration-gateway
spec:
  replicas: 1
  image:
    application: ${GATEWAY_IMAGE}
    init: confluentinc/confluent-init-container:3.2.0
  podTemplate:
    envVars:
      - name: GATEWAY_ROOT_LOG_LEVEL
        value: INFO
  streamingDomains:
    - name: source-kafka-cluster
      type: kafka
      kafkaCluster:
        bootstrapServers:
          - id: UNAUTHED
            endpoint: PLAINTEXT://${SOURCE_BOOTSTRAP_HOST}:9094
        nodeIdRanges:
          - name: pool-1
            start: 1
            end: 1
  routes:
    - name: migration-route
      endpoint: ${GATEWAY_LB_HOST}:9595
      fence:
        scope: ALL
        errorCode: BROKER_NOT_AVAILABLE
      brokerIdentificationStrategy:
        type: port
      streamingDomain:
        name: source-kafka-cluster
        bootstrapServerId: UNAUTHED
      security:
        client:
          authentication:
            type: none
        auth: passthrough
  externalAccess:
    type: loadBalancer
    loadBalancer:
      domain: ${GATEWAY_LB_HOST}
